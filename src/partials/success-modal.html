<div class="backdrop is-hidden" data-modal>
  <div class="modal">
    <button type="button" class="modal-close-btn" data-modal-close aria-label="Close modal">
      <svg class="modal-close-icon" width="24" height="24">
        <use href="./img/sprite.svg#icon-close"></use>
      </svg>
    </button>

    <h2 class="modal-title">Thank You for Your Inquiry!</h2>

    <div class="modal-img-wrapper">
      <picture>
        <source media="(min-width: 1440px)" srcset="
            ./img/success-modal/modal-dt@1x.jpg 1x,
            ./img/success-modal/modal-dt@2x.jpg 2x
          " />
        <source media="(min-width: 768px)" srcset="
            ./img/success-modal/modal-tab@1x.jpg 1x,
            ./img/success-modal/modal-tab@2x.jpg 2x
          " />
        <source media="(max-width: 767px)" srcset="
            ./img/success-modal/modal-mob@1x.jpg 1x,
            ./img/success-modal/modal-mob@2x.jpg 2x
          " />
        <img class="modal-img" src="./img/success-modal/modal-mob@1x.jpg" alt="Wedding inquiry aesthetics" width="295"
          height="207" loading="lazy" />
      </picture>
    </div>

    <p class="modal-text">
      I have received your message and I'm so excited about your interest! I
      will get in touch with you within 24-48 hours to discuss the details of
      your wedding day. In the meantime, feel free to browse my portfolio or
      follow me on Instagram for more inspiration.
    </p>
  </div>
</div>
